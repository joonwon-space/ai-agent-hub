<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent-hover: #4f52d9;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --success: #22c55e;
      --error: #f87171;
      --warning: #fbbf24;
      --radius: 10px;
      --sidebar-width: 240px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
    }

    .agent-list-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 4px 8px 8px;
    }

    .agent-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .agent-item:hover { background: var(--surface-hover); }

    .agent-item.active {
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .agent-item-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }

    .agent-item.active .agent-item-name { color: #a5b4fc; }

    .agent-item-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Main */
    #main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    .main-inner {
      width: 100%;
      max-width: 680px;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }

    .placeholder-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    /* Agent panel */
    .panel-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .panel-desc {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { min-height: 130px; }

    /* File upload */
    .file-upload-area {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-upload-area:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .file-upload-area.has-file {
      border-style: solid;
      border-color: var(--border);
      background: var(--surface);
    }

    .file-upload-area.uploading {
      opacity: 0.6;
      cursor: wait;
    }

    .file-upload-icon {
      font-size: 22px;
      flex-shrink: 0;
    }

    .file-upload-text {
      flex: 1;
      min-width: 0;
    }

    .file-upload-text .primary {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-upload-text .secondary {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .file-thumb {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .file-clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .file-clear-btn:hover { color: var(--error); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-success:hover:not(:disabled) { background: #16a34a; }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Preview card */
    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .preview-card h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .preview-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .preview-row:last-child { margin-bottom: 0; }

    .preview-key {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      width: 90px;
      flex-shrink: 0;
      padding-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .preview-val {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      flex: 1;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-bug { background: rgba(248,113,113,0.15); color: #f87171; }
    .badge-story { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .badge-task { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-highest { background: rgba(248,113,113,0.15); color: #f87171; }
    .badge-high { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-medium { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .badge-low { background: rgba(148,163,184,0.15); color: #94a3b8; }

    /* Result */
    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .result-box.success { border-color: rgba(34,197,94,0.4); }
    .result-box.error { border-color: rgba(248,113,113,0.4); }

    .result-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .result-label.success { color: var(--success); }
    .result-label.error { color: var(--error); }

    .result-link {
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .result-link:hover { text-decoration: underline; }

    .result-error-msg {
      color: var(--error);
      font-size: 13px;
      line-height: 1.6;
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .spinner-dark {
      border-color: rgba(0,0,0,0.2);
      border-top-color: var(--text-muted);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <h1>AI Agent Hub</h1>
    <p>Personal automation dashboard</p>
  </div>
  <div class="agent-list">
    <div class="agent-list-label">Agents</div>
    <div id="agent-list-items">
      <div style="padding: 10px 12px; color: var(--text-muted); font-size: 12px;">Loading...</div>
    </div>
  </div>
</aside>

<main id="main">
  <div class="main-inner">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">⚡</div>
      <div>
        <div style="font-size:16px; font-weight:600; color: var(--text); margin-bottom:6px;">에이전트를 선택하세요</div>
        <div style="font-size:13px;">왼쪽 사이드바에서 실행할 에이전트를 클릭하세요.</div>
      </div>
    </div>

    <div id="agent-panel" style="display:none;"></div>
  </div>
</main>

<script>
  let agents = [];
  let activeAgent = null;
  let previewData = null;
  let uploadedFileData = null; // { type, mimeType, filename, content }

  async function init() {
    const res = await fetch('/api/agents');
    agents = await res.json();
    renderSidebar();
  }

  function renderSidebar() {
    const el = document.getElementById('agent-list-items');
    if (!agents.length) {
      el.innerHTML = '<div style="padding:10px 12px;color:var(--text-muted);font-size:12px;">등록된 에이전트 없음</div>';
      return;
    }
    el.innerHTML = agents.map(a => `
      <div class="agent-item" data-name="${a.name}" onclick="selectAgent('${a.name}')">
        <div class="agent-item-name">${a.name}</div>
        <div class="agent-item-desc">${a.description}</div>
      </div>
    `).join('');
  }

  function selectAgent(name) {
    activeAgent = agents.find(a => a.name === name);
    previewData = null;
    uploadedFileData = null;

    document.querySelectorAll('.agent-item').forEach(el => {
      el.classList.toggle('active', el.dataset.name === name);
    });

    document.getElementById('placeholder').style.display = 'none';
    const panel = document.getElementById('agent-panel');
    panel.style.display = 'block';
    renderAgentPanel(panel);
  }

  function renderFileField(field) {
    return `
      <div class="form-group">
        <label>${field.label}</label>
        <input type="file" id="field-${field.key}-input" accept="${field.accept || '*'}"
          style="display:none;" onchange="handleFileSelect(event, '${field.key}')" />
        <div class="file-upload-area" id="field-${field.key}-area"
          onclick="document.getElementById('field-${field.key}-input').click()">
          <div class="file-upload-icon" id="field-${field.key}-icon">📎</div>
          <div class="file-upload-text">
            <div class="primary" id="field-${field.key}-name">클릭하여 파일 첨부</div>
            <div class="secondary">이미지, PDF, TXT, MD · 최대 10MB</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAgentPanel(panel) {
    const a = activeAgent;
    const isJira = a.name === 'jira';

    const formFields = a.inputSchema.map(field => {
      if (field.type === 'file') return renderFileField(field);
      if (field.type === 'textarea') {
        return `<div class="form-group"><label>${field.label}</label>
          <textarea id="field-${field.key}" placeholder="${field.placeholder || ''}"></textarea></div>`;
      }
      return `<div class="form-group"><label>${field.label}</label>
        <input type="${field.type || 'text'}" id="field-${field.key}" placeholder="${field.placeholder || ''}" /></div>`;
    }).join('');

    const actionButtons = isJira
      ? `<div class="btn-row">
           <button class="btn btn-primary" id="btn-preview" onclick="handlePreview()">
             <span id="preview-spinner" style="display:none;" class="spinner"></span>
             미리보기 생성
           </button>
         </div>`
      : `<div class="btn-row">
           <button class="btn btn-primary" id="btn-run" onclick="handleRun()">
             <span id="run-spinner" style="display:none;" class="spinner"></span>
             실행
           </button>
         </div>`;

    panel.innerHTML = `
      <div class="panel-title">${capitalize(a.name)} 에이전트</div>
      <div class="panel-desc">${a.description}</div>
      ${formFields}
      ${actionButtons}
      <div id="preview-section" style="display:none;"></div>
      <div id="result-section" style="display:none;"></div>
    `;
  }

  async function handleFileSelect(event, fieldKey) {
    const file = event.target.files[0];
    if (!file) return;

    const area = document.getElementById(`field-${fieldKey}-area`);
    const icon = document.getElementById(`field-${fieldKey}-icon`);
    const nameEl = document.getElementById(`field-${fieldKey}-name`);

    area.classList.add('uploading');
    nameEl.textContent = '업로드 중...';

    try {
      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '업로드 실패');

      uploadedFileData = data;
      renderFilePreview(fieldKey, data);
    } catch (e) {
      uploadedFileData = null;
      nameEl.textContent = `오류: ${e.message}`;
      area.classList.remove('uploading', 'has-file');
    }
  }

  function renderFilePreview(fieldKey, data) {
    const area = document.getElementById(`field-${fieldKey}-area`);
    const icon = document.getElementById(`field-${fieldKey}-icon`);
    const nameEl = document.getElementById(`field-${fieldKey}-name`);

    area.classList.remove('uploading');
    area.classList.add('has-file');
    area.onclick = null; // 파일 교체는 X 버튼으로

    if (data.type === 'image') {
      icon.innerHTML = `<img class="file-thumb" src="data:${data.mimeType};base64,${data.content}" alt="preview" />`;
    } else if (data.type === 'pdf') {
      icon.textContent = '📄';
    } else {
      icon.textContent = '📝';
    }

    nameEl.textContent = data.filename;
    nameEl.insertAdjacentHTML('afterend',
      `<div class="secondary">${data.type.toUpperCase()} · 첨부 완료</div>`);

    // X 버튼 추가
    area.insertAdjacentHTML('beforeend',
      `<button class="file-clear-btn" onclick="clearFile(event, '${fieldKey}')" title="파일 제거">✕</button>`);
  }

  function clearFile(event, fieldKey) {
    event.stopPropagation();
    uploadedFileData = null;

    const area = document.getElementById(`field-${fieldKey}-area`);
    const icon = document.getElementById(`field-${fieldKey}-icon`);
    const nameEl = document.getElementById(`field-${fieldKey}-name`);
    const input = document.getElementById(`field-${fieldKey}-input`);

    area.classList.remove('has-file');
    area.onclick = () => input.click();
    icon.textContent = '📎';
    nameEl.textContent = '클릭하여 파일 첨부';
    const secondary = nameEl.nextElementSibling;
    if (secondary && secondary.classList.contains('secondary')) {
      secondary.textContent = '이미지, PDF, TXT, MD · 최대 10MB';
    }
    const clearBtn = area.querySelector('.file-clear-btn');
    if (clearBtn) clearBtn.remove();
    input.value = '';
  }

  function getFormInput() {
    const input = {};
    activeAgent.inputSchema.forEach(field => {
      if (field.type === 'file') return; // 파일은 uploadedFileData로 별도 관리
      const el = document.getElementById(`field-${field.key}`);
      if (el) input[field.key] = el.value.trim();
    });
    if (uploadedFileData) input.fileData = uploadedFileData;
    return input;
  }

  async function handlePreview() {
    const input = getFormInput();
    const btn = document.getElementById('btn-preview');
    const spinner = document.getElementById('preview-spinner');

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';

    try {
      const res = await fetch(`/api/agents/${activeAgent.name}/preview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(input),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '미리보기 실패');

      previewData = data;
      renderPreview(data);
    } catch (e) {
      renderError(e.message);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  function renderPreview(data) {
    const fields = data.fields;
    const sec = document.getElementById('preview-section');
    sec.style.display = 'block';

    const typeClass = `badge-${fields.issuetype.toLowerCase()}`;
    const prioClass = `badge-${fields.priority.toLowerCase()}`;

    sec.innerHTML = `
      <hr class="divider" />
      <div class="preview-card">
        <h3>AI 추출 결과 — 확인 후 생성하세요</h3>
        <div class="preview-row">
          <div class="preview-key">Summary</div>
          <div class="preview-val">${esc(fields.summary)}</div>
        </div>
        <div class="preview-row">
          <div class="preview-key">Description</div>
          <div class="preview-val">${esc(fields.description)}</div>
        </div>
        <div class="preview-row">
          <div class="preview-key">Type</div>
          <div class="preview-val"><span class="badge ${typeClass}">${fields.issuetype}</span></div>
        </div>
        <div class="preview-row">
          <div class="preview-key">Priority</div>
          <div class="preview-val"><span class="badge ${prioClass}">${fields.priority}</span></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" id="btn-confirm" onclick="handleConfirm()">
          <span id="confirm-spinner" style="display:none;" class="spinner"></span>
          Jira 이슈 생성
        </button>
        <button class="btn btn-secondary" onclick="resetPreview()">다시 작성</button>
      </div>
    `;
  }

  async function handleConfirm() {
    if (!previewData) return;

    const input = getFormInput();
    const btn = document.getElementById('btn-confirm');
    const spinner = document.getElementById('confirm-spinner');

    btn.disabled = true;
    spinner.style.display = 'inline-block';

    try {
      const res = await fetch(`/api/agents/${activeAgent.name}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...input, fields: previewData.fields }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '이슈 생성 실패');

      renderSuccess(data);
    } catch (e) {
      renderError(e.message);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  async function handleRun() {
    const input = getFormInput();
    const btn = document.getElementById('btn-run');
    const spinner = document.getElementById('run-spinner');

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    document.getElementById('result-section').style.display = 'none';

    try {
      const res = await fetch(`/api/agents/${activeAgent.name}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(input),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '실행 실패');

      renderSuccess(data);
    } catch (e) {
      renderError(e.message);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  function renderSuccess(data) {
    const sec = document.getElementById('result-section');
    sec.style.display = 'block';

    let content = '';
    if (data.issueUrl) {
      content = `<a class="result-link" href="${data.issueUrl}" target="_blank">🔗 ${data.issueKey} — Jira에서 보기</a>`;
    } else {
      content = `<pre style="font-size:12px;color:var(--text-muted);white-space:pre-wrap;">${esc(JSON.stringify(data, null, 2))}</pre>`;
    }

    sec.innerHTML = `
      <hr class="divider" />
      <div class="result-box success">
        <div class="result-label success">✓ 성공</div>
        ${content}
      </div>
    `;
  }

  function renderError(msg) {
    const sec = document.getElementById('result-section');
    sec.style.display = 'block';
    sec.innerHTML = `
      <hr class="divider" />
      <div class="result-box error">
        <div class="result-label error">✗ 오류</div>
        <div class="result-error-msg">${esc(msg)}</div>
      </div>
    `;
  }

  function resetPreview() {
    previewData = null;
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';
  }

  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  init();
</script>
</body>
</html>
