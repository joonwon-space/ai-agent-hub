<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub</title>
  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body style="visibility:hidden">

<div id="topbar" style="position:fixed;top:0;left:0;right:0;height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;">
  <span style="font-size:13px;font-weight:700;color:var(--text);">AI Agent Hub</span>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="topbar-email" style="font-size:12px;color:var(--text-muted);"></span>
    <a href="/settings" style="font-size:12px;color:var(--text-muted);text-decoration:none;padding:4px 8px;border-radius:6px;transition:background 0.15s;" onmouseover="this.style.background='var(--surface-hover)'" onmouseout="this.style.background=''">설정</a>
    <button onclick="logout()" style="background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background 0.15s;" onmouseover="this.style.background='var(--surface-hover)'" onmouseout="this.style.background=''">로그아웃</button>
  </div>
</div>

<aside id="sidebar" style="margin-top:44px;height:calc(100vh - 44px)">
  <div class="sidebar-header">
    <h1>AI Agent Hub</h1>
    <p>Personal automation dashboard</p>
  </div>
  <div class="agent-list">
    <div class="agent-list-label">Agents</div>
    <div id="agent-list-items">
      <div style="padding: 10px 12px; color: var(--text-muted); font-size: 12px;">Loading...</div>
    </div>
  </div>
</aside>

<main id="main" style="margin-top:44px;height:calc(100vh - 44px)">
  <div class="main-inner">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">⚡</div>
      <div>
        <div style="font-size:16px; font-weight:600; color: var(--text); margin-bottom:6px;">에이전트를 선택하세요</div>
        <div style="font-size:13px;">왼쪽 사이드바에서 실행할 에이전트를 클릭하세요.</div>
      </div>
    </div>

    <div id="agent-panel" style="display:none;"></div>
  </div>
</main>

<script src="/src/js/auth.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/agents/jira.js"></script>
<script src="/src/js/main.js"></script>
</body>
</html>
