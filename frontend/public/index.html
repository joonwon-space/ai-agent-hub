<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub</title>
  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body style="visibility:hidden">

<div id="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-dot"><div class="topbar-logo-dot-inner"></div></div>
    <span class="topbar-logo-text">AI Agent Hub</span>
  </div>
  <div class="topbar-right">
    <span id="topbar-email" class="topbar-email"></span>
    <a href="/settings" class="btn-text">설정</a>
    <button onclick="logout()" class="btn-text">로그아웃</button>
  </div>
</div>

<aside id="sidebar" style="margin-top:48px;height:calc(100vh - 48px)">
  <div class="sidebar-header">
    <p>Personal automation dashboard</p>
  </div>
  <div class="agent-list">
    <div class="agent-list-label">Agents</div>
    <div id="agent-list-items">
      <div style="padding:10px 12px;color:#3d4558;font-size:12px;">Loading...</div>
    </div>
  </div>
</aside>

<main id="main" style="margin-top:48px;height:calc(100vh - 48px)">
  <div class="main-inner">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">⚡</div>
      <div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;">에이전트를 선택하세요</div>
        <div style="font-size:13px;">왼쪽 사이드바에서 실행할 에이전트를 클릭하세요.</div>
      </div>
    </div>

    <div id="agent-panel" style="display:none;"></div>
  </div>
</main>

<script src="/src/js/auth.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/agents/jira.js"></script>
<script src="/src/js/main.js"></script>
</body>
</html>
