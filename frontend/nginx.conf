server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    # index.html is removed; root / redirects to /my-space via exact-match block below

    # N-1: emit relative redirect Location headers so the browser preserves the
    # request scheme. Avoids nginx generating an http:// Location when behind a
    # TLS-terminating proxy (Cloudflare), which previously caused a brief
    # http→https intermediate hop on root navigation.
    absolute_redirect off;

    # /api/* 요청은 backend 컨테이너로 프록시
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 15m;
    }

    # Redirect root to My Space (index.html is no longer served)
    location = / {
        return 302 /my-space;
    }

    # 특정 페이지 라우트
    location /login {
        try_files /pages/login.html /pages/login.html;
    }

    location /signup {
        try_files /pages/signup.html /pages/signup.html;
    }

    location /settings {
        try_files /pages/settings.html /pages/settings.html;
    }

    # My Space 라우트 (multi-page, 각 .html이 따로 응답)
    location = /my-space {
        try_files /pages/my-space.html /pages/my-space.html;
    }

    location /my-space/diary {
        try_files /pages/my-space-diary-edit.html /pages/my-space-diary-edit.html;
    }

    location /my-space/diary/ {
        try_files /pages/my-space-diary-edit.html /pages/my-space-diary-edit.html;
    }

    # Recipe 라우트 (Screen 04: list, Screen 05: create/edit, Phase 3.5: view)
    location = /my-space/recipes {
        try_files /pages/my-space-recipes.html /pages/my-space-recipes.html;
    }

    location = /my-space/recipes/new {
        try_files /pages/my-space-recipe-edit.html /pages/my-space-recipe-edit.html;
    }

    # Phase 3.5: read-only view — must come BEFORE the generic \d+ edit pattern (first-match wins)
    location ~ ^/my-space/recipes/\d+/view$ {
        try_files /pages/my-space-recipe-view.html =404;
    }

    location ~ ^/my-space/recipes/ {
        try_files /pages/my-space-recipe-edit.html /pages/my-space-recipe-edit.html;
    }

    # Note 라우트 (Screen 06: list, Screen 07: create/edit)
    location = /my-space/notes {
        try_files /pages/my-space-notes.html /pages/my-space-notes.html;
    }

    location = /my-space/notes/new {
        try_files /pages/my-space-note-edit.html /pages/my-space-note-edit.html;
    }

    location /my-space/notes/ {
        try_files /pages/my-space-note-edit.html /pages/my-space-note-edit.html;
    }

    # 레시피 커버 정적 서빙 (named volume recipe_covers → /uploads/recipes/)
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML — always revalidate
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # JS/CSS — always revalidate (no content-hash filenames)
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # 정적 파일 서빙 (static assets)
    # M-4: unmatched paths (e.g., /agents, /dashboard, /register) fall back
    # to /my-space which itself auth-gates → /login when not logged in.
    # /api/* and /uploads/ short-circuit via earlier location blocks so this
    # fallback only catches HTML routing accidents, not API calls.
    location / {
        try_files $uri $uri/ /pages/my-space.html;
    }
}
