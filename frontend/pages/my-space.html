<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<script>(function(){var t=localStorage.getItem('aah-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Space — AI Agent Hub</title>
  <script src="/src/js/theme.js"></script>
  <link rel="stylesheet" href="/src/css/main.css" />
  <link rel="stylesheet" href="/src/css/my-space-tokens.css" />
  <link rel="stylesheet" href="/src/css/my-space.css" />
  <link rel="stylesheet" href="/src/css/my-space-recipe.css" />
  <link rel="stylesheet" href="/src/css/my-space-note.css" />
  <link rel="stylesheet" href="/src/css/my-space-jira.css" />
  <link rel="stylesheet" href="/src/css/my-space-modal.css" />
</head>
<body style="visibility:hidden">

<div id="topbar">
  <div class="topbar-logo">
    <a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none;">
      <div class="topbar-logo-dot"><div class="topbar-logo-dot-inner"></div></div>
      <span class="topbar-logo-text">AI Agent Hub</span>
    </a>
  </div>
  <div class="topbar-right">
    <span id="topbar-email" class="topbar-email"></span>
    <a href="/settings" class="btn-text">설정</a>
    <button id="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button onclick="logout()" class="btn-text">로그아웃</button>
  </div>
</div>

<main id="main" style="margin-top:48px;height:calc(100vh - 48px);overflow:hidden;display:flex;flex-direction:column;">
  <div id="ms-main" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <!-- Populated by my-space.js -->
  </div>
</main>

<script src="/src/js/auth.js"></script>
<script src="/src/js/my-space/api.js"></script>
<script src="/src/js/my-space/components.js"></script>
<script src="/src/js/my-space/recipes.js"></script>
<script src="/src/js/my-space/notes.js"></script>
<script src="/src/js/my-space/jira.js"></script>
<script src="/src/js/my-space/deleteSpaceModal.js"></script>
<script src="/src/js/pages/my-space.js"></script>
</body>
</html>
