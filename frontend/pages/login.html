<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent-hover: #4f52d9;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --error: #f87171;
      --success: #22c55e;
      --radius: 10px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
    }
    .msg.error { background: rgba(248,113,113,0.12); color: var(--error); display: block; }
    .msg.success { background: rgba(34,197,94,0.12); color: var(--success); display: block; }
    .signup-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .signup-link a { color: var(--accent); text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">AI Agent Hub</div>
    <div class="login-subtitle">로그인</div>

    <form id="login-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">로그인</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="signup-link">
      계정이 없으신가요? <a href="/signup">계정 만들기</a>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/login.js"></script>
</body>
</html>
