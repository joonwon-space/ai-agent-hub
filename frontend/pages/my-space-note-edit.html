<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<script>(function(){var t=localStorage.getItem('aah-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노트 편집 — My Space</title>
  <script src="/src/js/theme.js"></script>
  <link rel="stylesheet" href="/src/css/main.css" />
  <link rel="stylesheet" href="/src/css/my-space-tokens.css" />
  <link rel="stylesheet" href="/src/css/my-space.css" />
  <link rel="stylesheet" href="/src/css/my-space-note.css" />
</head>
<body style="visibility:hidden">

<div class="note-edit-topbar">
  <div class="note-edit-topbar__left">
    <button id="btn-back" class="btn-text" type="button">← 노트 목록</button>
    <input
      id="note-title-input"
      class="note-title-input"
      type="text"
      placeholder="제목을 입력하세요…"
      maxlength="120"
      autocomplete="off"
      spellcheck="false"
    />
  </div>
  <div class="note-edit-topbar__right">
    <button id="btn-pin" class="note-pin-toggle" type="button" aria-pressed="false">📌 고정</button>
    <div id="save-indicator" class="save-indicator" aria-live="polite"></div>
    <button id="theme-toggle" onclick="toggleTheme()" class="btn-text" type="button">☀️ Light</button>
  </div>
</div>

<main id="note-edit-main" class="note-edit-main">
  <!-- Populated by my-space-note-edit.js -->
</main>

<script src="/src/js/auth.js"></script>
<script src="/src/js/my-space/api.js"></script>
<script src="/src/js/my-space/autosave.js"></script>
<script src="/src/js/my-space/notes.js"></script>
<script src="/src/js/my-space/markdown.js"></script>
<script src="/src/js/my-space/components.js"></script>
<script src="/src/js/pages/my-space-note-edit.js"></script>
</body>
</html>
