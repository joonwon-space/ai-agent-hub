<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<script>(function(){var t=localStorage.getItem('aah-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레시피 편집 — My Space</title>
  <script src="/src/js/theme.js"></script>
  <link rel="stylesheet" href="/src/css/main.css" />
  <link rel="stylesheet" href="/src/css/my-space-tokens.css" />
  <link rel="stylesheet" href="/src/css/my-space.css" />
  <link rel="stylesheet" href="/src/css/my-space-recipe.css" />
</head>
<body style="visibility:hidden">

<div class="recipe-edit-topbar">
  <div class="recipe-edit-topbar__left">
    <button id="btn-back" class="btn-text" type="button">← 레시피 목록</button>
    <span style="font-size:14px;font-weight:600;color:var(--color-recipe-text);">레시피 편집</span>
  </div>
  <div class="recipe-edit-topbar__right">
    <div id="save-indicator" class="save-indicator" aria-live="polite"></div>
    <button id="theme-toggle" onclick="toggleTheme()" class="btn-text" type="button">☀️ Light</button>
  </div>
</div>

<main id="recipe-edit-main" class="recipe-edit-main">
  <!-- Populated by my-space-recipe-edit.js -->
</main>

<script src="/src/js/auth.js"></script>
<script src="/src/js/my-space/api.js"></script>
<script src="/src/js/my-space/autosave.js"></script>
<script src="/src/js/my-space/recipes.js"></script>
<script src="/src/js/my-space/components.js"></script>
<script src="/src/js/pages/my-space-recipe-edit.js"></script>
</body>
</html>
