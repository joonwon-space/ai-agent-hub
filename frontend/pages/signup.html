<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<script>(function(){var t=localStorage.getItem('aah-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 계정 생성</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="/src/css/auth.css" />
  <script src="/src/js/theme.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      position: relative;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03);
    }
    .theme-btn {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 7px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .theme-btn:hover { background: var(--accent-dim); color: var(--text); }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-dot {
      width: 28px; height: 28px;
      border-radius: 9px;
      background: linear-gradient(135deg, #1e90ff, #60b4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(30,144,255,0.5);
      flex-shrink: 0;
    }
    .logo-dot-inner {
      width: 10px; height: 10px;
      border-radius: 3px;
      background: #fff;
      opacity: 0.95;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }
    .subtitle {
      font-size: 14px;  /* M-1: was 13px — raised for low-vision a11y */
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      font-size: 14px;
      box-shadow: 0 4px 14px rgba(30,144,255,0.35);
    }
    .btn:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(30,144,255,0.50);
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" aria-label="테마 전환" aria-pressed="false" type="button">☀️ Light</button>
    <div class="logo-row">
      <div class="logo-dot"><div class="logo-dot-inner"></div></div>
      <span class="logo-text">AI Agent Hub</span>
    </div>
    <div class="title">계정 만들기</div>
    <div class="subtitle">새 계정을 생성하세요</div>

    <form id="signup-form" onsubmit="handleSubmit(event)" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" aria-label="이메일" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="8" aria-label="비밀번호" />
        <div class="hint">8자 이상</div>
      </div>
      <div class="form-group">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="••••••••" required autocomplete="new-password" aria-label="비밀번호 확인" />
      </div>
      <button type="submit" class="btn" id="submit-btn">계정 생성</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="footer">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/signup.js"></script>
</body>
</html>
