<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 계정 생성</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent-hover: #4f52d9;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --error: #f87171;
      --success: #22c55e;
      --radius: 10px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input.invalid { border-color: var(--error); }
    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
    }
    .msg.error { background: rgba(248,113,113,0.12); color: var(--error); display: block; }
    .msg.success { background: rgba(34,197,94,0.12); color: var(--success); display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">AI Agent Hub</div>
    <div class="card-subtitle">관리자 계정 생성</div>

    <form id="signup-form" onsubmit="handleSubmit(event)" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="8" />
        <div class="hint">8자 이상</div>
      </div>
      <div class="form-group">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">계정 생성</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="login-link">
      이미 계정이 있나요? <a href="/login">로그인</a>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/signup.js"></script>
</body>
</html>
