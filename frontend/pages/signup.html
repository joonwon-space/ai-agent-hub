<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 계정 생성</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080b13;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .card {
      background: rgba(14,17,28,0.9);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      position: relative;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-dot {
      width: 28px; height: 28px;
      border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(99,102,241,0.5);
      flex-shrink: 0;
    }
    .logo-dot-inner {
      width: 10px; height: 10px;
      border-radius: 3px;
      background: #fff;
      opacity: 0.95;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.3px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #e8ecf4;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }
    .subtitle {
      font-size: 13px;
      color: #4a5266;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4a5266;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      color: #dde3f0;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      font-family: inherit;
      transition: all 0.15s;
    }
    input:focus {
      background: rgba(99,102,241,0.05);
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    input.invalid {
      border-color: rgba(248,113,113,0.5);
    }
    .hint {
      font-size: 11px;
      color: #3d4558;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      background: linear-gradient(135deg, #6366f1 0%, #7c7ff5 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .btn:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .msg.error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: #f87171;
      display: block;
    }
    .msg.success {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      color: #22c55e;
      display: block;
    }
    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 12px;
      color: #3d4558;
    }
    .footer a { color: #818cf8; text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="logo-row">
      <div class="logo-dot"><div class="logo-dot-inner"></div></div>
      <span class="logo-text">AI Agent Hub</span>
    </div>
    <div class="title">계정 만들기</div>
    <div class="subtitle">새 계정을 생성하세요</div>

    <form id="signup-form" onsubmit="handleSubmit(event)" novalidate>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="8" />
        <div class="hint">8자 이상</div>
      </div>
      <div class="form-group">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn" id="submit-btn">계정 생성</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="footer">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/signup.js"></script>
</body>
</html>
