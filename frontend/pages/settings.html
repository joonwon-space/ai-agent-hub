<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2d3e;
      --accent: #6366f1;
      --accent-hover: #4f52d9;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --success: #22c55e;
      --error: #f87171;
      --radius: 10px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }
    /* Top bar */
    #topbar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    #topbar .logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    #topbar .right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #topbar .user-email {
      font-size: 12px;
      color: var(--text-muted);
    }
    .btn-text {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-text:hover { background: var(--surface-hover); color: var(--text); }

    /* Content */
    .content {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .page-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="url"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row { margin-top: 20px; }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
    }
    .msg.error { background: rgba(248,113,113,0.12); color: var(--error); display: block; }
    .msg.success { background: rgba(34,197,94,0.12); color: var(--success); display: block; }
  </style>
</head>
<body style="visibility:hidden">
  <div id="topbar">
    <a href="/" class="logo">AI Agent Hub</a>
    <div class="right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-text" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <h2>설정</h2>
    <p class="page-desc">에이전트가 사용할 외부 서비스 연동 정보를 입력하세요.</p>

    <div class="settings-card">
      <div class="section-label">Jira 연동</div>

      <form id="settings-form" onsubmit="handleSave(event)">
        <div class="form-group">
          <label for="jira_base_url">Jira Base URL</label>
          <input type="url" id="jira_base_url" placeholder="https://yourorg.atlassian.net" />
        </div>
        <div class="form-group">
          <label for="jira_email">Jira 이메일</label>
          <input type="email" id="jira_email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="jira_api_token">Jira API 토큰</label>
          <input type="password" id="jira_api_token" placeholder="저장된 토큰을 변경하려면 새 값을 입력하세요" autocomplete="off" />
          <p class="field-hint">비워두면 기존 값 유지. Atlassian 계정 → 보안 → API 토큰에서 발급</p>
        </div>
        <div class="form-group">
          <label for="jira_project_key">Jira 프로젝트 키</label>
          <input type="text" id="jira_project_key" placeholder="PROJ" />
        </div>

        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="save-btn">저장</button>
        </div>
      </form>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/settings.js"></script>
</body>
</html>
