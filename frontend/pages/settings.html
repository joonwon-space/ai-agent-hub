<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<script>(function(){var t=localStorage.getItem('aah-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 설정</title>
  <link rel="stylesheet" href="/src/css/auth.css" />
  <script src="/src/js/theme.js"></script>
  <style>
    body { min-height: 100vh; }
    #topbar {
      height: 48px;
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .topbar-logo-dot {
      width: 22px; height: 22px;
      border-radius: 7px;
      background: linear-gradient(135deg, #1e90ff, #60b4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(30,144,255,0.45);
      flex-shrink: 0;
    }
    .topbar-logo-dot-inner {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: #fff;
      opacity: 0.9;
    }
    .topbar-logo-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .topbar-right { display: flex; align-items: center; gap: 4px; }
    .user-email { font-size: 11px; color: var(--text-muted); margin-right: 8px; }
    .btn-text {
      background: none;
      border: none;
      color: var(--text-subtle);
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 7px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-text:hover { background: var(--accent-dim); color: var(--text); }
    #theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 7px;
      font-family: inherit;
      transition: all 0.15s;
    }
    #theme-toggle:hover { background: var(--accent-dim); color: var(--text); }
    .content { max-width: 660px; margin: 40px auto; padding: 0 20px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.4px; }
    .page-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-faint);
      margin-bottom: 20px;
    }
    .btn-row { margin-top: 20px; }
  </style>
</head>
<body style="visibility:hidden">
  <div id="topbar">
    <a href="/" class="topbar-logo">
      <div class="topbar-logo-dot"><div class="topbar-logo-dot-inner"></div></div>
      <span class="topbar-logo-text">AI Agent Hub</span>
    </a>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환" aria-pressed="false" type="button">☀️ Light</button>
      <button class="btn-text" onclick="logout()" aria-label="로그아웃" type="button">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <h2>설정</h2>
    <p class="page-desc">에이전트가 사용할 외부 서비스 연동 정보를 입력하세요.</p>

    <div class="settings-card">
      <div class="section-label">Jira 연동</div>

      <form id="settings-form" onsubmit="handleSave(event)">
        <div class="form-group">
          <label for="jira_base_url">Jira Base URL</label>
          <input type="url" id="jira_base_url" placeholder="https://yourorg.atlassian.net" />
        </div>
        <div class="form-group">
          <label for="jira_email">Jira 이메일</label>
          <input type="email" id="jira_email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="jira_api_token">Jira API 토큰</label>
          <input type="password" id="jira_api_token" placeholder="저장된 토큰을 변경하려면 새 값을 입력하세요" autocomplete="off" />
          <p class="field-hint">비워두면 기존 값 유지. Atlassian 계정 → 보안 → API 토큰에서 발급</p>
        </div>
        <div class="form-group">
          <label for="jira_project_key">Jira 프로젝트 키</label>
          <input type="text" id="jira_project_key" placeholder="PROJ" />
        </div>

        <div class="btn-row">
          <button type="submit" class="btn" id="save-btn">저장</button>
        </div>
      </form>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/settings.js"></script>
</body>
</html>
