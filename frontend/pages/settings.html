<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Hub — 설정</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b13;
      --border: rgba(255,255,255,0.06);
      --accent: #6366f1;
      --text: #e2e8f0;
      --text-muted: #555e72;
      --success: #22c55e;
      --error: #f87171;
      --radius: 10px;
    }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }
    #topbar {
      height: 48px;
      background: rgba(8,11,19,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .topbar-logo-dot {
      width: 22px; height: 22px;
      border-radius: 7px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(99,102,241,0.45);
      flex-shrink: 0;
    }
    .topbar-logo-dot-inner {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: #fff;
      opacity: 0.9;
    }
    .topbar-logo-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .topbar-right { display: flex; align-items: center; gap: 4px; }
    .user-email { font-size: 11px; color: var(--text-muted); margin-right: 8px; }
    .btn-text {
      background: none;
      border: none;
      color: #6b7585;
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 7px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-text:hover { background: rgba(255,255,255,0.06); color: #c4ccd8; }
    .content { max-width: 560px; margin: 40px auto; padding: 0 20px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.4px; }
    .page-desc { font-size: 13px; color: #4a5266; margin-bottom: 28px; }
    .settings-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
    }
    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #333a4d;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4a5266;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="url"] {
      width: 100%;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      color: #dde3f0;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      font-family: inherit;
      transition: all 0.15s;
    }
    input:focus {
      background: rgba(99,102,241,0.05);
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .field-hint { font-size: 11px; color: #3d4558; margin-top: 4px; }
    .btn-row { margin-top: 20px; }
    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(135deg, #6366f1 0%, #7c7ff5 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.3);
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .btn:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .msg.error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--error);
      display: block;
    }
    .msg.success {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      color: var(--success);
      display: block;
    }
  </style>
</head>
<body style="visibility:hidden">
  <div id="topbar">
    <a href="/" class="topbar-logo">
      <div class="topbar-logo-dot"><div class="topbar-logo-dot-inner"></div></div>
      <span class="topbar-logo-text">AI Agent Hub</span>
    </a>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-text" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <h2>설정</h2>
    <p class="page-desc">에이전트가 사용할 외부 서비스 연동 정보를 입력하세요.</p>

    <div class="settings-card">
      <div class="section-label">Jira 연동</div>

      <form id="settings-form" onsubmit="handleSave(event)">
        <div class="form-group">
          <label for="jira_base_url">Jira Base URL</label>
          <input type="url" id="jira_base_url" placeholder="https://yourorg.atlassian.net" />
        </div>
        <div class="form-group">
          <label for="jira_email">Jira 이메일</label>
          <input type="email" id="jira_email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="jira_api_token">Jira API 토큰</label>
          <input type="password" id="jira_api_token" placeholder="저장된 토큰을 변경하려면 새 값을 입력하세요" autocomplete="off" />
          <p class="field-hint">비워두면 기존 값 유지. Atlassian 계정 → 보안 → API 토큰에서 발급</p>
        </div>
        <div class="form-group">
          <label for="jira_project_key">Jira 프로젝트 키</label>
          <input type="text" id="jira_project_key" placeholder="PROJ" />
        </div>

        <div class="btn-row">
          <button type="submit" class="btn" id="save-btn">저장</button>
        </div>
      </form>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/src/js/auth.js"></script>
  <script src="/src/js/pages/settings.js"></script>
</body>
</html>
