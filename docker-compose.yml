volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aihub
      - POSTGRES_PASSWORD=aihub
      - POSTGRES_DB=aihub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # 외부 포트 미노출 — backend에서만 접근

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./backend/src:/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    restart: unless-stopped
    # 외부 포트 미노출 — frontend nginx 프록시를 통해서만 접근

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
