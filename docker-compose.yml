volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aihub
      - POSTGRES_PASSWORD=aihub
      - POSTGRES_DB=aihub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aihub -d aihub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 외부 포트 미노출 — backend에서만 접근

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./backend/src:/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/auth/setup-required || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 외부 포트 미노출 — frontend nginx 프록시를 통해서만 접근

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
